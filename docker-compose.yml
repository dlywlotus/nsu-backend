services:
  postgres:
    container_name: postgres
    image: postgres:17
    environment:
      - POSTGRES_DB=nsu
      - POSTGRES_PASSWORD=123
      - POSTGRES_USER=postgres
    ports:
      - '5434:5432'
    volumes:
      - db-data:/var/lib/postgresql/data
  redis:
    container_name: redis
    image: redis:alpine
    ports:
      - '6378:6379'
    volumes:
      - redis-data:/data
    command: redis-server --requirepass 123
  rust-fs:
    container_name: rust-fs
    image: rustfs/rustfs:latest
    environment:
      - RUSTFS_ACCESS_KEY=admin
      - RUSTFS_SECRET_KEY=123
      - RUSTFS_SERVER_DOMAINS=localhost
      - RUSTFS_CONSOLE_ENABLE=true

    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - rust-fs-data:/data

volumes:
  db-data:
  redis-data:
  rust-fs-data: